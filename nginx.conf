# ============================================================
# nginx.conf — 前端静态文件服务 + 后端 API 反向代理
#
# 适用于根目录 docker-compose.yml 的全栈部署方案：
#   - / 路由：serve Vite 打包后的静态文件
#   - /api 路由：反向代理到 auth-api 容器
#   - /health 路由：反向代理到 auth-api 健康检查
# ============================================================

server {
    listen 80;
    server_name _;

    # 静态文件根目录（对应 Dockerfile 中 COPY dist /usr/share/nginx/html）
    root /usr/share/nginx/html;
    index index.html;

    # ── 安全响应头 ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip 压缩 ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── API 反向代理（/api/* → auth-api 容器） ─────────────────
    location /api/ {
        proxy_pass         http://auth-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── 健康检查反向代理 ────────────────────────────────────────
    location /health {
        proxy_pass         http://auth-api:3000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── 静态资源：长期缓存（Vite 带 hash 文件名） ───────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA 路由：所有未匹配路径回退到 index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，确保每次都获取最新版本
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 禁止访问隐藏文件 ────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
